
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">
        <i class="fas fa-calculator mr-2"></i>
        <span data-i18n="divePlanner.title">Dive Planner</span>
    </h1>

    <!-- Dive Parameters Form -->
    <div class="card rounded-lg shadow-lg p-6 mb-6">
        <h2 class="text-xl font-semibold mb-4">
            <i class="fas fa-sliders-h mr-2"></i>
            Dive Parameters
        </h2>
        
        <form id="divePlanForm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="diveLocation" class="block text-sm font-medium mb-2">
                        <span data-i18n="divePlanner.location">Dive Location</span>
                    </label>
                    <input type="text" id="diveLocation" class="w-full px-3 py-2 border rounded-lg">
                </div>
                
                <div>
                    <label for="diveType" class="block text-sm font-medium mb-2">
                        Dive Type
                    </label>
                    <select id="diveType" class="w-full px-3 py-2 border rounded-lg">
                        <option value="recreational">Recreational</option>
                        <option value="technical">Technical</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label for="diveDepth" class="block text-sm font-medium mb-2">
                        <span data-i18n="divePlanner.maxDepth">Maximum Depth</span>
                        (<span data-unit="depth">m</span>)
                    </label>
                    <input type="number" id="diveDepth" class="w-full px-3 py-2 border rounded-lg" value="18" min="1">
                </div>
                
                <div>
                    <label for="bottomTime" class="block text-sm font-medium mb-2">
                        <span data-i18n="divePlanner.bottomTime">Bottom Time</span>
                        (<span data-i18n="divePlanner.minutes">minutes</span>)
                    </label>
                    <input type="number" id="bottomTime" class="w-full px-3 py-2 border rounded-lg" value="40" min="1">
                </div>
            </div>

            <div class="mb-4">
                <label for="sacRate" class="block text-sm font-medium mb-2">
                    <span data-i18n="divePlanner.sacRate">SAC Rate</span> (L/min)
                </label>
                <input type="number" id="sacRate" class="w-full px-3 py-2 border rounded-lg" value="20" min="10" max="40">
            </div>

            <!-- Tank Management -->
            <div class="mb-4">
                <hr class="my-4">
                <div class="flex justify-between items-center mb-3">
                    <h6 class="text-lg font-semibold">
                        <i class="fas fa-gas-pump mr-2"></i>Tanks
                    </h6>
                    <button type="button" id="addTankInlineButton" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-plus mr-1"></i>Add Tank
                    </button>
                </div>
                <div id="tanksContainer">
                    <div class="alert alert-info p-3 bg-blue-50 border border-blue-200 rounded" id="noTanksMessage">
                        <i class="fas fa-info-circle mr-2"></i>No tanks added yet. Add a tank to start planning.
                    </div>
                </div>
            </div>

            <!-- Buddy Management -->
            <div class="mb-4">
                <hr class="my-4">
                <div class="flex justify-between items-center mb-3">
                    <h6 class="text-lg font-semibold">
                        <i class="fas fa-users mr-2"></i>Dive Buddies
                    </h6>
                    <button type="button" id="addBuddyInlineButton" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-plus mr-1"></i>Add Buddy
                    </button>
                </div>
                <div id="buddiesContainer">
                    <div class="alert alert-info p-3 bg-blue-50 border border-blue-200 rounded" id="noBuddiesMessage">
                        <i class="fas fa-info-circle mr-2"></i>No buddies added yet.
                    </div>
                </div>
            </div>

            <button type="button" id="calculateButton" class="w-full px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                <i class="fas fa-calculator mr-2"></i>
                <span data-i18n="divePlanner.calculatePlan">Calculate Dive Plan</span>
            </button>
        </form>
    </div>

    <!-- Results Section -->
    <div id="resultsSection" class="card rounded-lg shadow-lg p-6" style="display: none;">
        <h2 class="text-xl font-semibold mb-4">
            <i class="fas fa-chart-line mr-2"></i>
            <span data-i18n="divePlanner.results">Dive Profile and Results</span>
        </h2>
        <div id="resultsContent"></div>
    </div>
</div>
