<div class="container mx-auto px-4 py-8">
    <h2 class="text-3xl font-bold mb-6" style="color: var(--color-text)">
        <i class="fas fa-map-marked-alt mr-3" style="color: var(--color-primary)"></i>
        World Dive Routes
    </h2>
    
    <div class="card rounded-lg shadow-lg p-6">
        <div id="map-container" style="height: 500px;" class="rounded-lg overflow-hidden mb-6"></div>
        
        <h3 class="text-xl font-semibold mb-4" style="color: var(--color-text)">Featured Dive Sites</h3>
        <div id="dive-sites-list" class="grid md:grid-cols-3 gap-4"></div>
    </div>
</div>

<script>
const diveSites = [
    { name: "Great Barrier Reef", country: "Australia", lat: -16.2861, lon: 145.7781 },
    { name: "Blue Hole", country: "Belize", lat: 17.3167, lon: -87.5353 },
    { name: "Sipadan Island", country: "Malaysia", lat: 4.1167, lon: 118.6333 }
];

// Initialize map
const map = L.map('map-container').setView([0, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

diveSites.forEach(site => {
    L.marker([site.lat, site.lon]).addTo(map).bindPopup(`<strong>${site.name}</strong><br>${site.country}`);
    
    const div = document.createElement('div');
    div.className = 'card p-4 rounded-lg';
    div.innerHTML = `
        <h4 class="font-semibold" style="color: var(--color-primary)">${site.name}</h4>
        <p class="text-sm" style="color: var(--color-text-secondary)">${site.country}</p>
    `;
    document.getElementById('dive-sites-list').appendChild(div);
});
</script>
