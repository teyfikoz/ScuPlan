<div class="container mx-auto px-4 py-8">
    <h2 class="text-3xl font-bold mb-6" style="color: var(--color-text)">
        <i class="fas fa-flask mr-3" style="color: var(--color-primary)"></i>
        Technical Diving Calculators
    </h2>
    
    <div class="grid md:grid-cols-2 gap-6">
        <div class="card rounded-lg shadow-lg p-6">
            <h3 class="text-xl font-semibold mb-4" style="color: var(--color-text)">MOD Calculator</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--color-text)">Oxygen % (FO₂)</label>
                    <input type="number" id="mod-o2" class="w-full px-3 py-2 border rounded" value="21">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--color-text)">Max PO₂ (bar)</label>
                    <select id="mod-po2" class="w-full px-3 py-2 border rounded">
                        <option value="1.4">1.4 (Working)</option>
                        <option value="1.6">1.6 (Deco)</option>
                    </select>
                </div>
                <button onclick="calculateMOD()" class="w-full btn-primary py-2 rounded">Calculate MOD</button>
                <div id="mod-result" class="mt-3 p-3 bg-purple-50 rounded hidden">
                    <div class="font-semibold" style="color: var(--color-text)">Maximum Operating Depth:</div>
                    <div id="mod-value" class="text-2xl font-bold" style="color: var(--color-primary)">--</div>
                </div>
            </div>
        </div>
        
        <div class="card rounded-lg shadow-lg p-6">
            <h3 class="text-xl font-semibold mb-4" style="color: var(--color-text)">Best Mix Calculator</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--color-text)">Target Depth (m)</label>
                    <input type="number" id="bestmix-depth" class="w-full px-3 py-2 border rounded" value="30">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--color-text)">Max PO₂ (bar)</label>
                    <select id="bestmix-po2" class="w-full px-3 py-2 border rounded">
                        <option value="1.4">1.4 (Working)</option>
                        <option value="1.6">1.6 (Deco)</option>
                    </select>
                </div>
                <button onclick="calculateBestMix()" class="w-full btn-primary py-2 rounded">Calculate Best Mix</button>
                <div id="bestmix-result" class="mt-3 p-3 bg-teal-50 rounded hidden">
                    <div class="font-semibold" style="color: var(--color-text)">Optimal Gas Mix:</div>
                    <div id="bestmix-value" class="text-2xl font-bold text-teal-600">--</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
window.calculateMOD = function() {
    const o2 = parseFloat(document.getElementById('mod-o2').value);
    const po2 = parseFloat(document.getElementById('mod-po2').value);
    const mod = ((po2 / (o2 / 100)) - 1) * 10;
    document.getElementById('mod-result').classList.remove('hidden');
    document.getElementById('mod-value').textContent = `${mod.toFixed(1)} m`;
};

window.calculateBestMix = function() {
    const depth = parseFloat(document.getElementById('bestmix-depth').value);
    const po2 = parseFloat(document.getElementById('bestmix-po2').value);
    const bestMix = (po2 / ((depth / 10) + 1)) * 100;
    document.getElementById('bestmix-result').classList.remove('hidden');
    document.getElementById('bestmix-value').textContent = `EAN${Math.round(bestMix)}`;
};
</script>
