<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScuPlan - You're Offline</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0A192F;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        .offline-container {
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #64FFDA;
        }
        
        p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .wifi-icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: #64FFDA;
        }
        
        .button {
            display: inline-block;
            background-color: #64FFDA;
            color: #0A192F;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .button:hover {
            background-color: #4CD6BA;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="wifi-icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you don't have an internet connection right now. ScuPlan requires internet access to load properly.</p>
        <p>You can still access any dive plans or checklists you've previously saved for offline use.</p>
        <p>Please check your connection and try again.</p>
        <a href="/" class="button">Try Again</a>
    </div>
</body>
</html>
