{% extends "layout.html" %}
{% block title %}World Dive Routes - ScuPlan{% endblock %}

{% block head_extras %}
<!-- Leaflet.js CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<!-- Marker Cluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1><i class="fas fa-map-marked-alt me-2"></i>World Dive Routes</h1>
                <div class="btn-group" role="group">
                    <button type="button" class="btn btn-outline-primary btn-sm" id="listViewBtn" onclick="toggleView('list')">
                        <i class="fas fa-list"></i> List View
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-sm active" id="mapViewBtn" onclick="toggleView('map')">
                        <i class="fas fa-map"></i> Map View
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="regionFilter" class="form-label">Region</label>
                            <select class="form-select" id="regionFilter" onchange="filterDiveSites()">
                                <option value="">All Regions</option>
                                <option value="pacific">Pacific Ocean</option>
                                <option value="atlantic">Atlantic Ocean</option>
                                <option value="indian">Indian Ocean</option>
                                <option value="mediterranean">Mediterranean Sea</option>
                                <option value="caribbean">Caribbean Sea</option>
                                <option value="red-sea">Red Sea</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="difficultyFilter" class="form-label">Difficulty</label>
                            <select class="form-select" id="difficultyFilter" onchange="filterDiveSites()">
                                <option value="">All Levels</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="advanced">Advanced</option>
                                <option value="technical">Technical</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="typeFilter" class="form-label">Dive Type</label>
                            <select class="form-select" id="typeFilter" onchange="filterDiveSites()">
                                <option value="">All Types</option>
                                <option value="reef">Coral Reef</option>
                                <option value="wreck">Wreck Diving</option>
                                <option value="cave">Cave Diving</option>
                                <option value="drift">Drift Diving</option>
                                <option value="wall">Wall Diving</option>
                                <option value="macro">Macro Photography</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="searchInput" class="form-label">Search</label>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search dive sites..." onkeyup="filterDiveSites()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Map View -->
    <div id="mapViewContainer" class="row" style="display: block;">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0"><i class="fas fa-globe-americas me-2"></i>Interactive World Dive Map</h5>
                </div>
                <div class="card-body p-0">
                    <div id="worldMap" style="height: 600px;"></div>
                    
                    <!-- Turkish Airlines CTA Banner -->
                    <div class="p-3 bg-light border-top">
                        <a href="https://www.turkishairlinesholidays.com/en-tr/diving-and-snorkelling-hotels-vacation-package" 
                           target="_blank" 
                           class="btn btn-primary w-100 py-3 fw-bold">
                            <i class="fas fa-plane me-2"></i>
                            🛫 Explore Dive Trips with Turkish Airlines Holidays
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- List View -->
    <div id="listViewContainer" class="row" style="display: none;">
        <div class="col-12">
            <div id="diveSitesList">
                <!-- Dive sites will be populated here -->
            </div>
        </div>
    </div>
</div>

<!-- Leaflet.js and Marker Cluster JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<!-- Dive Routes functionality -->
<script src="{{ url_for('static', filename='js/dive-routes.js') }}"></script>

{% endblock %}
