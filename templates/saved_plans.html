{% extends 'layout.html' %}

{% block title %}Saved Dive Plans - ScuPlan{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="page-title">Saved Dive Plans</h1>
            <p class="lead">Manage your saved dive plans here.</p>
        </div>
    </div>
    
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div id="savedPlansContainer">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3">Loading your saved plans...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row mt-4">
        <div class="col-12 text-center">
            <button id="clearAllPlansBtn" class="btn btn-outline-danger">
                <i class="fas fa-trash me-1"></i> Clear All Saved Plans
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="fas fa-arrow-left me-1"></i> Return to Dive Planner
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize saved plans functionality
        if (typeof initSavedPlans === 'function') {
            initSavedPlans();
        } else {
            console.error('Storage.js module not loaded or initSavedPlans function not available');
            document.getElementById('savedPlansContainer').innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    Error: Could not initialize saved plans. Please refresh the page or try again later.
                </div>
            `;
        }
    });
</script>
{% endblock %}
