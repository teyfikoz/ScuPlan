{% extends "layout.html" %}

{% block title %}Shared Plan Not Found{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-exclamation-triangle me-2"></i> Plan Not Found
                    </h4>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="fas fa-search fa-4x text-muted"></i>
                    </div>
                    
                    <h5>Sorry, the dive plan you're looking for couldn't be found.</h5>
                    <p class="text-muted">The link may be incorrect or the plan may have been deleted.</p>
                    
                    <div class="mt-4">
                        <a href="{{ url_for('index') }}" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i> Return to Home
                        </a>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-primary ms-2">
                            <i class="fas fa-calculator me-2"></i> Create New Dive Plan
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
